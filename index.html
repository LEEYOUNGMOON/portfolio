<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📈 주식 포트폴리오</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:#07101d;color:#e2e8f0;overflow:hidden}
:root{
  --bg:#07101d;--p1:#0d1829;--p2:#111f35;--p3:#162440;
  --bd:#1e3050;--bd2:#2a4060;
  --bl:#3b82f6;--pu:#8b5cf6;--gr:#10b981;--rd:#ef4444;--yw:#f59e0b;
  --mt:#64748b;--t2:#94a3b8;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#1e3050;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:50px;display:flex;align-items:center;gap:14px;padding:0 16px;background:rgba(7,16,29,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)}
.brand{font-size:.96rem;font-weight:900;white-space:nowrap;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topstats{display:flex;gap:14px;flex:1}
.ts{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.ts-l{font-size:.6rem;color:var(--mt);letter-spacing:.3px}
.ts-v{font-size:.82rem;font-weight:800}
.livebadge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--mt);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 8px var(--gr);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;height:100vh;padding-top:50px}
.left{width:300px;min-width:300px;background:var(--p1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.left-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.market-strip{flex-shrink:0;padding:8px 11px;border-bottom:1px solid var(--bd);background:#060d1a}
.market-ttl{font-size:.6rem;font-weight:800;color:var(--mt);letter-spacing:.4px;margin-bottom:6px}
.market-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mcard{background:var(--p2);border:1px solid var(--bd);border-radius:8px;padding:7px 8px;text-align:center}
.mcard-nm{font-size:.58rem;color:var(--mt);margin-bottom:3px}
.mcard-val{font-size:.82rem;font-weight:800}
.mcard-chg{font-size:.65rem;font-weight:700;margin-top:2px}
.add-form{flex-shrink:0;padding:9px 11px;border-bottom:1px solid var(--bd)}
.form-ttl{font-size:.62rem;font-weight:800;color:var(--mt);letter-spacing:.5px;margin-bottom:7px}
.search-wrap{position:relative;margin-bottom:6px}
.si{width:100%;background:#060d1a;border:1.5px solid var(--bd);color:#e2e8f0;border-radius:8px;padding:8px 30px 8px 10px;font-size:.8rem;font-family:inherit;outline:none;transition:.2s}
.si:focus{border-color:var(--bl);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.si::placeholder{color:var(--mt)}
.s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mt);cursor:pointer;font-size:.8rem;display:none}
.s-clear.show{display:block}
.ac-drop{position:absolute;top:calc(100%+4px);left:0;right:0;z-index:999;background:var(--p2);border:1.5px solid var(--bd2);border-radius:10px;max-height:200px;overflow-y:auto;display:none;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.ac-drop.open{display:block}
.ac-item{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.focused{background:rgba(59,130,246,.12)}
.ac-name{font-size:.82rem;font-weight:700}
.ac-sub{text-align:right}
.ac-code{font-size:.68rem;color:var(--mt)}
.ac-mkt{font-size:.6rem;background:rgba(59,130,246,.15);color:#60a5fa;padding:1px 6px;border-radius:99px;display:inline-block;margin-top:2px}
.ac-mkt.kq{background:rgba(139,92,246,.15);color:#c084fc}
.sel-tag{display:none;align-items:center;justify-content:space-between;background:rgba(59,130,246,.08);border:1.5px solid rgba(59,130,246,.25);border-radius:8px;padding:6px 10px;margin-bottom:6px}
.sel-tag.show{display:flex}
.sel-name{font-size:.82rem;font-weight:800}
.sel-code{font-size:.65rem;color:var(--mt)}
.sel-x{background:none;border:none;color:var(--mt);cursor:pointer;font-size:.9rem}
.sel-x:hover{color:var(--rd)}
.watch-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 8px;background:#060d1a;border-radius:7px;border:1px solid var(--bd);cursor:pointer;user-select:none}
.watch-chk{width:14px;height:14px;accent-color:var(--yw);cursor:pointer;flex-shrink:0}
.watch-lbl{font-size:.76rem;font-weight:700;color:var(--yw)}
.watch-desc{font-size:.65rem;color:var(--mt);margin-left:auto}
.buy-row{display:flex;gap:6px;margin-bottom:6px}
.buy-row.hidden{display:none!important}
.inp{flex:1;min-width:0;background:#060d1a;border:1.5px solid var(--bd);color:#e2e8f0;border-radius:7px;padding:7px 8px;font-size:.77rem;font-family:inherit;outline:none;transition:.2s}
.inp:focus{border-color:var(--bl)}
.inp::placeholder{color:var(--mt);font-size:.72rem}
.add-btn{width:100%;background:linear-gradient(135deg,var(--bl),var(--pu));color:#fff;border:none;border-radius:8px;padding:9px;font-size:.8rem;font-weight:800;font-family:inherit;cursor:pointer;transition:.2s}
.add-btn:hover:not(:disabled){filter:brightness(1.1)}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.news-panel{flex-shrink:0;padding:8px 11px;border-bottom:1px solid var(--bd)}
.panel-ttl{font-size:.6rem;font-weight:800;color:var(--mt);letter-spacing:.4px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.live-tag{font-size:.55rem;background:rgba(16,185,129,.15);color:var(--gr);padding:1px 5px;border-radius:99px;font-weight:700}
.news-scroll{max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.nli{display:flex;align-items:flex-start;gap:6px;padding:5px 7px;background:#060d1a;border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:.15s;text-decoration:none;color:#e2e8f0}
.nli:hover{border-color:var(--bl);background:#0d1e35}
.nli-dot{width:5px;height:5px;border-radius:50%;background:var(--bl);flex-shrink:0;margin-top:4px}
.nli-body{flex:1;min-width:0}
.nli-title{font-size:.68rem;line-height:1.35}
.nli-meta{font-size:.58rem;color:var(--mt);margin-top:1px}
.nli-stk{font-size:.56rem;font-weight:800;padding:1px 4px;border-radius:3px;display:inline-block;margin-bottom:2px}
.theme-panel{flex-shrink:0;padding:8px 11px;border-bottom:1px solid var(--bd)}
.theme-cols{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.theme-col-ttl{font-size:.62rem;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.theme-list{display:flex;flex-direction:column;gap:3px}
.theme-row{display:flex;justify-content:space-between;align-items:center;padding:4px 7px;background:#060d1a;border-radius:5px;border:1px solid var(--bd)}
.theme-nm{font-size:.68rem;font-weight:700}
.theme-chg{font-size:.65rem;font-weight:800}
.summary{flex-shrink:0;padding:7px 11px;background:#060d1a;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sm{background:var(--p2);border:1px solid var(--bd);border-radius:7px;padding:6px 8px}
.sm.full{grid-column:span 2;display:flex;justify-content:space-between;align-items:center}
.sm-l{font-size:.58rem;color:var(--mt)}
.sm-v{font-size:.82rem;font-weight:800}
.stock-list{padding:8px}
.scard{background:var(--p2);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:6px;cursor:pointer;transition:.2s;border-left:3px solid transparent}
.scard:hover,.scard.active{border-left-color:var(--bl);background:var(--p3)}
.scard.watch-card{border-left-color:var(--yw)}
.scard.warn{border-left-color:var(--yw)}
.scard.danger{border-left-color:var(--rd);animation:dp 3s infinite}
@keyframes dp{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(239,68,68,.2)}}
.sc-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.sc-nm{font-size:.85rem;font-weight:800}
.sc-cd{font-size:.64rem;color:var(--mt)}
.sc-tags{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.stag{font-size:.58rem;padding:1px 5px;border-radius:99px;font-weight:700}
.stag.w{background:rgba(245,158,11,.12);color:var(--yw)}
.stag.h{background:rgba(59,130,246,.12);color:#60a5fa}
.stag.warn{background:rgba(245,158,11,.1);color:var(--yw)}
.stag.danger{background:rgba(239,68,68,.1);color:var(--rd)}
.sc-price{font-size:.9rem;font-weight:800;text-align:right}
.sc-chg{font-size:.67rem;font-weight:700;text-align:right;margin-top:1px}
.sc-bot{display:flex;justify-content:space-between;align-items:center;font-size:.67rem;color:var(--mt);padding-top:6px;border-top:1px solid var(--bd)}
.sc-pnl{font-size:.65rem;font-weight:800;padding:1px 6px;border-radius:99px}
.sc-btns{display:flex;gap:4px;margin-top:6px}
.sbtn{flex:1;background:none;border:1px solid var(--bd);color:var(--mt);border-radius:6px;padding:4px 0;font-size:.65rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.18s}
.sbtn:hover{border-color:var(--bl);color:var(--bl)}
.sbtn.del:hover{border-color:var(--rd);color:var(--rd)}
.edit-panel{display:none;margin-top:6px;background:#060d1a;border:1px solid var(--bl);border-radius:8px;padding:8px}
.edit-panel.show{display:block}
.ep-ttl{font-size:.63rem;color:#60a5fa;font-weight:800;margin-bottom:5px}
.ep-row{display:flex;gap:4px;margin-bottom:6px}
.ep-inp{flex:1;min-width:0;background:var(--p2);border:1px solid var(--bd);color:#e2e8f0;border-radius:6px;padding:6px 7px;font-size:.74rem;font-family:inherit;outline:none}
.ep-acts{display:flex;gap:4px}
.ep-save{flex:1;background:linear-gradient(135deg,var(--bl),var(--pu));color:#fff;border:none;border-radius:6px;padding:6px;font-size:.7rem;font-weight:800;cursor:pointer;font-family:inherit}
.ep-cancel{flex:1;background:none;border:1px solid var(--bd2);color:var(--mt);border-radius:6px;padding:6px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit}
.up{color:var(--rd)}.dn{color:var(--gr)}
.right{flex:1;min-width:0;overflow-y:auto;background:radial-gradient(ellipse at top left,rgba(59,130,246,.05),transparent 40%),var(--bg);padding:14px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:12px;text-align:center}
.welcome-ic{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;background:rgba(59,130,246,.1);border:1px solid var(--bd);animation:fl 4s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.dh{background:linear-gradient(135deg,var(--p2),var(--p3));border:1px solid var(--bd);border-radius:14px;padding:15px 18px;margin-bottom:12px}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.dh-nm{font-size:1.3rem;font-weight:900;margin-bottom:5px}
.dh-meta{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:.64rem;padding:2px 8px;border-radius:99px;background:rgba(139,92,246,.12);color:#c4b5fd;border:1px solid rgba(139,92,246,.2)}
.badge-w{background:rgba(245,158,11,.12);color:var(--yw);border-color:rgba(245,158,11,.25)}
.dh-r{text-align:right}
.dh-price{font-size:1.75rem;font-weight:900;line-height:1}
.dh-chg{font-size:.86rem;font-weight:800;margin-top:4px}
.dh-sub{font-size:.66rem;color:var(--mt);margin-top:2px}
.inds{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.ind{background:#060d1a;border:1px solid var(--bd);border-radius:7px;padding:7px;text-align:center}
.ind-l{font-size:.56rem;color:var(--mt);margin-bottom:2px}
.ind-v{font-size:.76rem;font-weight:800}
.tabs{display:flex;gap:2px;background:var(--p2);border:1px solid var(--bd);border-radius:10px;padding:3px;margin-bottom:12px;overflow-x:auto}
.tab{flex:1;border:none;background:transparent;color:var(--mt);border-radius:8px;padding:7px 4px;font-size:.7rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.18s;white-space:nowrap}
.tab:hover{color:#e2e8f0}
.tab.active{background:linear-gradient(135deg,var(--bl),var(--pu));color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.tc{display:none}.tc.active{display:block}
.chart-ctrl{display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.pbtn{background:var(--p2);border:1px solid var(--bd);color:var(--mt);border-radius:99px;padding:4px 11px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.18s}
.pbtn.active{background:var(--bl);border-color:var(--bl);color:#fff}
.pbtn:hover:not(.active){border-color:var(--bl);color:var(--bl)}
.chart-wrap{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:12px}
.chart-legend{display:flex;gap:12px;margin-bottom:8px;font-size:.68rem;color:var(--t2);flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:14px;height:3px;border-radius:2px}
.candle-box{position:relative;width:100%;height:320px;background:#060d1a;border-radius:8px;overflow:hidden}
#candleCanvas{width:100%;height:100%}
.chart-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#060d1a;border-radius:8px;font-size:.78rem;color:var(--mt)}
.chart-loading.hide{display:none}
.cspin{width:20px;height:20px;border:2.5px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.abox{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:11px;margin-bottom:12px}
.box-t{font-size:.63rem;font-weight:800;color:var(--mt);letter-spacing:.4px;margin-bottom:8px}
.ta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ta-c{background:#060d1a;border:1px solid var(--bd);border-radius:7px;padding:8px;text-align:center}
.ta-n{font-size:.57rem;color:var(--mt);margin-bottom:2px}
.ta-v{font-size:.8rem;font-weight:800}
.lvl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lvl-col-t{font-size:.63rem;font-weight:800;color:var(--mt);margin-bottom:5px}
.lv{display:flex;align-items:center;gap:6px;background:#060d1a;border:1px solid var(--bd);border-radius:7px;padding:6px 8px;margin-bottom:4px}
.lv-b{font-size:.6rem;font-weight:900;color:#fff;padding:2px 5px;border-radius:4px;white-space:nowrap}
.s1{background:#dc2626}.s2{background:#b91c1c}.s3{background:#991b1b}
.t1{background:#059669}.t2{background:#047857}.t3{background:#065f46}
.b1{background:#7c3aed}.b2{background:#6d28d9}.b3{background:#5b21b6}
.lv-info{flex:1;display:flex;flex-direction:column;gap:1px}
.lv-p{font-size:.78rem;font-weight:900}
.lv-s{font-size:.57rem;color:var(--mt)}
.pnl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pc{background:#060d1a;border:1px solid var(--bd);border-radius:7px;padding:9px;text-align:center}
.pc-hl{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.2)}
.pc-l{font-size:.57rem;color:var(--mt);margin-bottom:3px}
.pc-v{font-size:.9rem;font-weight:900}
.nf-bar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.nf-refresh{margin-left:auto;background:none;border:1px solid var(--bd);color:var(--mt);border-radius:6px;padding:3px 8px;font-size:.65rem;cursor:pointer;font-family:inherit;transition:.18s}
.nf-refresh:hover{border-color:var(--bl);color:var(--bl)}
.news-list-r{display:flex;flex-direction:column;gap:5px}
.ni-r{display:block;padding:9px 11px;background:#060d1a;border:1px solid var(--bd);border-radius:9px;transition:.18s;text-decoration:none;color:#e2e8f0}
.ni-r:hover{border-color:var(--bl);background:#0d1e35}
.ni-r.td{border-left:3px solid var(--rd)}
.ni-r.tn{border-left:3px solid var(--bl)}
.ni-title{font-size:.79rem;font-weight:700;line-height:1.45;color:#e2e8f0;margin-bottom:3px}
.ni-meta{font-size:.64rem;color:var(--mt);margin-top:3px}
.ni-desc{font-size:.64rem;color:var(--t2);margin-top:2px;line-height:1.4;opacity:.8}
.news-loading{display:flex;align-items:center;gap:8px;padding:14px;color:var(--mt);font-size:.76rem}
.news-empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:24px;color:var(--mt);font-size:.76rem;text-align:center}
.ftable{width:100%;border-collapse:collapse;font-size:.75rem}
.ftable th,.ftable td{padding:7px 9px;border-bottom:1px solid var(--bd);text-align:right}
.ftable th:first-child,.ftable td:first-child{text-align:left}
.fin-note{margin-top:9px;padding:9px 11px;border-left:3px solid var(--bl);background:rgba(59,130,246,.05);border-radius:0 7px 7px 0;font-size:.74rem;line-height:1.75;color:#cbd5e1}
.op-buy{color:var(--gr);background:rgba(16,185,129,.1);border-radius:4px;padding:1px 6px;font-size:.66rem;font-weight:800}
.op-hold{color:var(--yw);background:rgba(245,158,11,.1);border-radius:4px;padding:1px 6px;font-size:.66rem;font-weight:800}
.peer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px}
.peer-c{background:#060d1a;border:1px solid var(--bd);border-radius:7px;padding:9px;cursor:pointer;transition:.18s}
.peer-c:hover{border-color:var(--pu)}
.peer-n{font-size:.78rem;font-weight:800}
.peer-cd{font-size:.62rem;color:var(--mt);margin-top:1px}
.peer-p{font-size:.84rem;font-weight:900;margin-top:6px}
.peer-g{font-size:.67rem;font-weight:700;margin-top:1px}
#toast{position:fixed;bottom:14px;right:14px;background:var(--p3);border:1px solid var(--bd2);color:#e2e8f0;padding:9px 13px;border-radius:9px;font-size:.78rem;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;transform:translateY(60px);opacity:0;transition:.25s cubic-bezier(.34,1.56,.64,1)}
#toast.show{transform:translateY(0);opacity:1}
.dev-id{position:fixed;left:10px;bottom:10px;z-index:50;background:var(--p2);border:1px solid var(--bd);border-radius:99px;padding:3px 9px;font-size:.6rem;color:var(--mt)}
@media(max-width:860px){
  html,body{overflow:auto}
  .layout{flex-direction:column;height:auto}
  .left{width:100%;min-width:unset;height:auto;border-right:none;border-bottom:1px solid var(--bd)}
  .right{padding:10px}
  .inds,.ta-grid{grid-template-columns:repeat(3,1fr)}
  .pnl-grid{grid-template-columns:repeat(2,1fr)}
  .lvl-grid{grid-template-columns:1fr}
  .topstats{display:none}
}
</style>
</head>
<body>
<div id="toast"></div>
<div class="dev-id" id="devId">—</div>
<header class="topbar">
  <div class="brand">📈 주식 포트폴리오</div>
  <div class="topstats">
    <div class="ts"><span class="ts-l">총 매입</span><span class="ts-v" id="hBuy">—</span></div>
    <div class="ts"><span class="ts-l">총 평가</span><span class="ts-v" id="hEval">—</span></div>
    <div class="ts"><span class="ts-l">평가손익</span><span class="ts-v" id="hPnl">—</span></div>
    <div class="ts"><span class="ts-l">수익률</span><span class="ts-v" id="hRate">—</span></div>
  </div>
  <div class="livebadge"><div class="dot"></div><span id="liveTime">—</span></div>
</header>
<div class="layout">
<aside class="left">
  <div class="left-scroll">
    <div class="market-strip">

function stripHtml(str){
  if(!str)return'';
  return str.replace(/<b>/gi,'').replace(/<\/b>/gi,'')
    .replace(/&quot;/gi,'"').replace(/&amp;/gi,'&')
    .replace(/&#039;/gi,"'").replace(/&lt;/gi,'<')
    .replace(/&gt;/gi,'>').replace(/<[^>]*>/g,'').trim();
}

function relTime(pubDate){
  if(!pubDate)return'';
  try{
    const diff=Date.now()-new Date(pubDate).getTime();
    const mins=Math.floor(diff/60000);
    if(mins<1)return'방금 전';
    if(mins<60)return mins+'분 전';
    const hrs=Math.floor(mins/60);
    if(hrs<24)return hrs+'시간 전';
    return Math.floor(hrs/24)+'일 전';
  }catch{return'';}
}

function extractSource(url){
  if(!url)return'네이버뉴스';
  try{
    const host=new URL(url).hostname.replace('www.','');
    const map={
      'news.naver.com':'네이버뉴스','news.mt.co.kr':'머니투데이',
      'hankyung.com':'한국경제','mk.co.kr':'매일경제',
      'chosun.com':'조선비즈','edaily.co.kr':'이데일리',
      'newspim.com':'뉴스핌','thebell.co.kr':'더벨',
      'sedaily.com':'서울경제','fnnews.com':'파이낸셜뉴스',
      'yna.co.kr':'연합뉴스','news1.kr':'뉴스1',
      'ytn.co.kr':'YTN','mbn.co.kr':'MBN',
    };
    for(const[d,n]of Object.entries(map)){if(host.includes(d))return n;}
    return host.split('.')[0];
  }catch{return'뉴스';}
}

async function fetchNaverNews(query,display=10){
  try{
    const res=await fetch(`${API_BASE}/api/news?query=${encodeURIComponent(query)}&display=${display}&sort=date`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data.items||!Array.isArray(data.items))return[];
    return data.items.map(item=>({
      type      :'news',
      title     :stripHtml(item.title),
      link      :item.originallink||item.link,
      naverLink :item.link,
      description:stripHtml(item.description),
      pubDate   :item.pubDate,
      source    :extractSource(item.originallink||item.link)
    }));
  }catch(e){
    console.warn('네이버 뉴스 실패:',e.message);
    return[];
  }
}

/* ══════════════════════════════════
   ★ DART 공시 API (서버 경유)
══════════════════════════════════ */
async function fetchDartList(stockCode,stockName,count=15){
  try{
    // 1차: 종목코드로 시도
    let res=await fetch(`${API_BASE}/api/dart?code=${stockCode}&count=${count}`);
    let data=await res.json();

    // 결과 없으면 2차: 회사명으로 검색
    if(!data.list||data.list.length===0){
      res=await fetch(`${API_BASE}/api/dart/search?name=${encodeURIComponent(stockName)}&count=${count}`);
      data=await res.json();
    }

    if(data.status!=='000'||!data.list)return[];

    return data.list.map(item=>({
      type      :'dart',
      title     :item.report_nm,
      link      :`https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${item.rcept_no}`,
      naverLink :`https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${item.rcept_no}`,
      description:`제출인: ${item.flr_nm}`,
      pubDate   :item.rcept_dt
        ? new Date(item.rcept_dt.slice(0,4)+'-'+item.rcept_dt.slice(4,6)+'-'+item.rcept_dt.slice(6,8)).toUTCString()
        : '',
      source    :'DART 공시',
      corpName  :item.corp_name,
      rceptNo   :item.rcept_no,
      rceptDt   :item.rcept_dt
    }));
  }catch(e){
    console.warn('DART 공시 실패:',e.message);
    return[];
  }
}

async function loadLeftNews(){
  const el=document.getElementById('leftNews');
  if(!el)return;
  if(!stocks.length){
    el.innerHTML=`<div style="font-size:.7rem;color:var(--mt);padding:6px">종목 추가 후 뉴스가 표시됩니다</div>`;
    return;
  }
  el.innerHTML=`<div style="font-size:.7rem;color:var(--mt);padding:6px;display:flex;align-items:center;gap:6px"><div class="cspin" style="width:12px;height:12px;border-width:2px"></div>뉴스 로딩중...</div>`;

  const watchStocks=stocks.filter(s=>s.isWatch);
  const holdStocks=stocks.filter(s=>!s.isWatch);
  const targets=[...watchStocks,...holdStocks].slice(0,5);

  const results=await Promise.all(targets.map(s=>fetchNaverNews(s.name+' 주가 주식',5)));

  let allNews=[];
  results.forEach((list,i)=>{
    list.forEach(n=>allNews.push({...n,stockName:targets[i].name,isWatch:targets[i].isWatch}));
  });

  const seen=new Set();
  allNews=allNews.filter(n=>{
    if(seen.has(n.link))return false;
    seen.add(n.link);return true;
  }).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));

  if(!allNews.length){
    el.innerHTML=`<div style="font-size:.7rem;color:var(--mt);padding:6px">뉴스를 불러올 수 없습니다</div>`;
    return;
  }

  el.innerHTML=allNews.slice(0,25).map(n=>{
    const t=n.title.length>28?n.title.slice(0,28)+'…':n.title;
    const tagColor=n.isWatch?'var(--yw)':'#60a5fa';
    const tagBg=n.isWatch?'rgba(245,158,11,.15)':'rgba(59,130,246,.15)';
    return`<a href="${n.naverLink||n.link}" target="_blank" rel="noopener" class="nli">
      <div class="nli-dot" style="background:${tagColor}"></div>
      <div class="nli-body">
        <div><span class="nli-stk" style="background:${tagBg};color:${tagColor}">${n.isWatch?'⭐':'💼'} ${n.stockName}</span></div>
        <div class="nli-title">${t}</div>
        <div class="nli-meta">${n.source} · ${relTime(n.pubDate)}</div>
      </div>
    </a>`;
  }).join('');
}

async function loadRightNews(name,code){
  const area=document.getElementById('newsArea');
  if(!area)return;

  area.innerHTML=`<div class="news-loading"><div class="cspin"></div>${name} 뉴스·공시 로딩중...</div>`;

  // 뉴스 2종 + DART 공시 병렬 조회
  const[news1,news2,dartList]=await Promise.all([
    fetchNaverNews(name+' 주가',15),
    fetchNaverNews(name+' 실적 전망',8),
    fetchDartList(code,name,20)
  ]);

  // 뉴스 중복 제거 + 날짜순
  const seen=new Set();
  const mergedNews=[...news1,...news2].filter(n=>{
    if(seen.has(n.link))return false;
    seen.add(n.link);return true;
  }).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));

  _rNews=[...mergedNews,...dartList];
  console.log(`📰 뉴스 ${mergedNews.length}건 | 📋 공시 ${dartList.length}건`);

  renderRNews('all');

  if(_rNewsTimer)clearTimeout(_rNewsTimer);
  _rNewsTimer=setTimeout(()=>loadRightNews(name,code),180000);
}

document.getElementById('si').addEventListener('input',function(){
  const val=this.value;
  document.getElementById('sClear').classList.toggle('show',!!val);
  acFocus=-1;
  const drop=document.getElementById('acDrop');
  if(!val.trim()){drop.classList.remove('open');drop.innerHTML='';return;}
  const q=val.trim().toLowerCase().replace(/\s/g,'');
  const res=DB.filter(s=>s.n.toLowerCase().replace(/\s/g,'').includes(q)||s.c.includes(q)).slice(0,14);
  if(!res.length){drop.classList.remove('open');drop.innerHTML='';return;}
  drop.innerHTML=res.map((s,i)=>`
    <div class="ac-item" data-idx="${i}" onmouseenter="setF(${i})" onclick="pick('${s.c}','${s.n}','${s.m}')">
      <div class="ac-name">${s.n}</div>
      <div class="ac-sub"><div class="ac-code">${s.c}</div><div class="ac-mkt ${s.m==='Q'?'kq':''}">${MKT[s.m]}</div></div>
    </div>`).join('');
  drop.classList.add('open');
  drop._res=res;
});

document.getElementById('si').addEventListener('keydown',function(e){
  const drop=document.getElementById('acDrop');
  const items=drop.querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acFocus=Math.min(acFocus+1,items.length-1);updF(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acFocus=Math.max(acFocus-1,0);updF(items);}
  else if(e.key==='Enter'&&acFocus>=0&&drop._res){const s=drop._res[acFocus];pick(s.c,s.n,s.m);}
  else if(e.key==='Escape')drop.classList.remove('open');
});

function setF(i){acFocus=i;updF(document.getElementById('acDrop').querySelectorAll('.ac-item'));}
function updF(items){items.forEach((el,i)=>el.classList.toggle('focused',i===acFocus));}

function pick(code,name,mkt){

  document.getElementById('si').value=name;

  document.getElementById('acDrop').classList.remove('open');
  document.getElementById('selName').textContent=name;
  document.getElementById('selCode').textContent=code+' · '+(MKT[mkt]||mkt);
  document.getElementById('selTag').classList.add('show');
  const btn=document.getElementById('addBtn');
  btn.disabled=false;btn.textContent='＋ '+name+' 추가하기';

}

function addStock(){
  if(!selSt){toast('종목을 먼저 선택하세요');return;}
  if(!isWatchMode){
    const price=parseFloat(document.getElementById('prI').value);
    const qty=parseInt(document.getElementById('qtI').value);
    if(!price||price<=0){toast('⚠️ 매입가를 입력해주세요');return;}
    if(!qty||qty<=0){toast('⚠️ 수량을 입력해주세요');return;}
  }
  if(stocks.find(s=>s.code===selSt.code)){toast('이미 추가된 종목입니다');return;}
  const price=isWatchMode?0:parseFloat(document.getElementById('prI').value);
  const qty=isWatchMode?0:parseInt(document.getElementById('qtI').value);
  stocks.push({code:selSt.code,name:selSt.name,market:selSt.market,buyPrice:price,qty,isWatch:isWatchMode,addedAt:Date.now()});
  save();
  clearSel();
  document.getElementById('prI').value='';
  document.getElementById('qtI').value='';
  document.getElementById('watchChk').checked=false;
  isWatchMode=false;
  document.getElementById('buyRow').classList.remove('hidden');
  renderList();updateSummary();
  toast('✅ '+stocks[stocks.length-1].name+' 추가!');
  const code=stocks[stocks.length-1].code;
  fetchPrice(code).then(p=>{if(p){prices[code]=p;renderList();updateSummary();}});
  loadLeftNews();
}

const KQ_SET=new Set(DB.filter(s=>s.m==='Q').map(s=>s.c));
function sym(code){return code+(KQ_SET.has(code)?'.KQ':'.KS');}

async function fetchPrice(code){
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym(code)}?interval=1d&range=1d`;
    const m=JSON.parse((await(await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)).json()).contents).chart.result[0].meta;
    return{price:m.regularMarketPrice,prev:m.previousClose||m.chartPreviousClose,
      open:m.regularMarketOpen,high:m.regularMarketDayHigh,low:m.regularMarketDayLow,
      vol:m.regularMarketVolume,mktCap:m.marketCap,h52:m.fiftyTwoWeekHigh,l52:m.fiftyTwoWeekLow,per:m.trailingPE,pbr:m.priceToBook};
  }catch{return null;}
}

async function fetchOHLC(code,period){
  const cfg={'1w':{r:'1mo',i:'1d'},'1m':{r:'3mo',i:'1d'},'3m':{r:'6mo',i:'1d'},'6m':{r:'1y',i:'1wk'},'1y':{r:'2y',i:'1wk'}};
  const{r,i}=cfg[period]||{r:'3mo',i:'1d'};
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym(code)}?interval=${i}&range=${r}`;
    const res=JSON.parse((await(await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)).json()).contents).chart.result[0];
    const q=res.indicators.quote[0];
    return res.timestamp.map((t,idx)=>({t:t*1000,o:q.open[idx],h:q.high[idx],l:q.low[idx],c:q.close[idx],v:q.volume[idx]})).filter(d=>d.o!=null&&d.h!=null&&d.l!=null&&d.c!=null);
  }catch{return null;}
}

async function fetchMarket(){

    {s:'^KQ11',vi:'mKosdaq',ci:'mKosdaqC'},

const THEME_DATA=[

  {name:'방산',  syms:['012450.KS','272210.KS','079550.KS']},

  {name:'AI·로봇',syms:['454910.KS','277810.KQ','064350.KS']},
  {name:'바이오', syms:['068270.KS','028300.KS','196170.KQ']},
  {name:'인터넷', syms:['035420.KS','035720.KS','377300.KS']},
  {name:'자동차', syms:['005380.KS','000270.KS','086280.KS']},
  {name:'조선',   syms:['009540.KS','010140.KS','042660.KS']},
];

async function fetchThemes(){
  const results=[];
  await Promise.all(THEME_DATA.map(async th=>{
    let total=0,cnt=0;
    await Promise.all(th.syms.slice(0,2).map(async s=>{
      try{
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=1d`;
        const m=JSON.parse((await(await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)).json()).contents).chart.result[0].meta;
        const cur=m.regularMarketPrice,prev=m.previousClose||m.chartPreviousClose||cur;
        total+=(cur-prev)/prev*100;cnt++;
      }catch{}
    }));
    if(cnt>0)results.push({name:th.name,chg:total/cnt});
  }));
  results.sort((a,b)=>b.chg-a.chg);
  const up=results.filter(r=>r.chg>=0).slice(0,4);
  const dn=results.filter(r=>r.chg<0).sort((a,b)=>a.chg-b.chg).slice(0,4);
  const upEl=document.getElementById('upThemes');
  const dnEl=document.getElementById('dnThemes');
  if(upEl)upEl.innerHTML=up.length?up.map(r=>`<div class="theme-row"><span class="theme-nm">${r.name}</span><span class="theme-chg up">▲ +${r.chg.toFixed(2)}%</span></div>`).join(''):'<div style="font-size:.66rem;color:var(--mt)">데이터 없음</div>';
  if(dnEl)dnEl.innerHTML=dn.length?dn.map(r=>`<div class="theme-row"><span class="theme-nm">${r.name}</span><span class="theme-chg dn">▼ ${r.chg.toFixed(2)}%</span></div>`).join(''):'<div style="font-size:.66rem;color:var(--mt)">데이터 없음</div>';
}

function renderList(){
  const el=document.getElementById('stockList');
  if(!stocks.length){el.innerHTML='<div style="text-align:center;color:var(--mt);padding:20px 8px;font-size:.78rem">종목을 추가해보세요</div>';return;}
  el.innerHTML=stocks.map((s,i)=>{
    const cp=prices[s.code],cur=cp?.price;
    const chgP=cur&&cp.prev?(cur-cp.prev)/cp.prev*100:null;
    const pnlA=(!s.isWatch&&cur)?(cur-s.buyPrice)*s.qty:null;
    const pnlP=(!s.isWatch&&cur)?((cur-s.buyPrice)/s.buyPrice*100):null;
    const isUp=chgP>=0;
    let risk='';
    if(cp&&!s.isWatch&&stopLv[s.code]){const st=stopLv[s.code];if(st[1]&&cur<=st[1].p)risk='danger';else if(st[0]&&cur<=st[0].p)risk='warn';}
    const pb=pnlA>=0?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)';
    const pc=pnlA>=0?'#10b981':'#ef4444';
    const tags=[];
    if(s.isWatch)tags.push('<span class="stag w">⭐ 관심</span>');
    else tags.push('<span class="stag h">💼 보유</span>');
    if(risk==='danger')tags.push('<span class="stag danger">⛔ 손절위험</span>');
    else if(risk==='warn')tags.push('<span class="stag warn">⚠️ 경고</span>');
    return`<div class="scard ${selIdx===i?'active':''} ${s.isWatch?'watch-card':''} ${risk}" onclick="selectStock(${i})">
      <div class="sc-top">
        <div>
          <div class="sc-nm">${s.name}</div>
          <div class="sc-cd">${s.code} · ${s.market}</div>
          <div class="sc-tags">${tags.join('')}</div>
        </div>
        <div>
          <div class="sc-price ${isUp?'up':'dn'}">${cur?cur.toLocaleString()+'원':'조회중'}</div>
          <div class="sc-chg ${isUp?'up':'dn'}">${chgP!==null?(isUp?'▲ +':'▼ ')+Math.abs(chgP).toFixed(2)+'%':''}</div>
        </div>
      </div>

function updateSummary(){

  stocks.forEach(s=>{if(!s.isWatch){const cp=prices[s.code];buy+=s.buyPrice*s.qty;ev+=(cp?cp.price:s.buyPrice)*s.qty;}});
  const pnl=ev-buy,rate=buy?pnl/buy*100:0,isUp=pnl>=0;
  const pt=(isUp?'+':'')+Math.round(pnl).toLocaleString()+'원';
  const rt=(rate>=0?'+':'')+rate.toFixed(2)+'%';
  ['sBuy','hBuy'].forEach(id=>set(id,buy.toLocaleString()+'원'));
  ['sEval','hEval'].forEach(id=>set(id,ev.toLocaleString()+'원'));
  ['sPnl','hPnl'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent=pt;e.className='sm-v '+(isUp?'up':'dn');}});
  ['sRate','hRate'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent=rt;e.className='ts-v '+(isUp?'up':'dn');}});
}

/* ══════════════════════════════════
   캔들차트
══════════════════════════════════ */
function drawCandleChart(ohlc){
  const canvas=document.getElementById('candleCanvas');
  if(!canvas)return;
  const mask=document.getElementById('chartMask');
  if(mask)mask.classList.add('hide');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
  if(!ohlc||!ohlc.length)return;
  const PAD={t:16,b:36,l:10,r:72};
  const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
  const maxP=Math.max(...ohlc.map(d=>d.h)),minP=Math.min(...ohlc.map(d=>d.l));
  const pr=maxP-minP||1,pMax=maxP+pr*.06,pMin=minP-pr*.06,pRange=pMax-pMin;
  const yOf=p=>PAD.t+CH*(1-(p-pMin)/pRange);
  const n=ohlc.length,cw=Math.max(1,Math.floor(CW/n)-1);
  const xOf=i=>PAD.l+(i+.5)*(CW/n);
  ctx.fillStyle='#060d1a';ctx.fillRect(0,0,W,H);
  for(let i=0;i<=5;i++){
    const y=PAD.t+(CH/5)*i;
    ctx.strokeStyle='rgba(30,48,80,.7)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    const price=pMax-(pRange/5)*i;
    ctx.fillStyle='#64748b';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText(Math.round(price).toLocaleString(),W-PAD.r+4,y+3);
  }
  const ma5=[],ma20=[];
  for(let i=0;i<n;i++){
    ma5.push(i>=4?ohlc.slice(i-4,i+1).reduce((s,d)=>s+d.c,0)/5:null);
    ma20.push(i>=19?ohlc.slice(i-19,i+1).reduce((s,d)=>s+d.c,0)/20:null);
  }
  const drawLine=(data,color)=>{ctx.strokeStyle=color;ctx.lineWidth=1.3;ctx.beginPath();let f=true;data.forEach((v,i)=>{if(v){const y=yOf(v);if(f){ctx.moveTo(xOf(i),y);f=false;}else ctx.lineTo(xOf(i),y);}});ctx.stroke();};
  drawLine(ma5,'#fbbf24');drawLine(ma20,'#c084fc');
  ohlc.forEach((d,i)=>{
    const x=xOf(i),isUp=d.c>=d.o,color=isUp?'#ef4444':'#10b981';
    const yH=yOf(d.h),yL=yOf(d.l),yO=yOf(d.o),yC=yOf(d.c);
    const bTop=Math.min(yO,yC),bH=Math.max(1,Math.abs(yO-yC)),half=Math.max(1,Math.floor(cw/2));
    ctx.strokeStyle=color;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
    ctx.fillStyle=isUp?'rgba(239,68,68,.85)':'rgba(16,185,129,.85)';
    ctx.strokeStyle=color;ctx.lineWidth=.5;
    ctx.fillRect(x-half,bTop,cw,bH);ctx.strokeRect(x-half,bTop,cw,bH);
  });
  const step=Math.max(1,Math.floor(n/8));
  ctx.fillStyle='#64748b';ctx.font='9px sans-serif';ctx.textAlign='center';
  for(let i=0;i<n;i+=step){const dt=new Date(ohlc[i].t);ctx.fillText(`${dt.getMonth()+1}/${dt.getDate()}`,xOf(i),H-PAD.b+14);}
}

/* ══════════════════════════════════
   기술적 분석
══════════════════════════════════ */
function calcTA(ohlc){
  if(!ohlc||ohlc.length<5)return null;
  const cl=ohlc.map(d=>d.c),hi=ohlc.map(d=>d.h),lo=ohlc.map(d=>d.l),n=cl.length;
  const ma=(a,l)=>a.slice(-Math.min(l,a.length)).reduce((s,v)=>s+v,0)/Math.min(l,a.length);
  const ma5=ma(cl,5),ma20=ma(cl,20),ma60=ma(cl,Math.min(60,n));
  const s20=cl.slice(-Math.min(20,n)),bm=s20.reduce((a,b)=>a+b,0)/s20.length;
  const std=Math.sqrt(s20.reduce((a,v)=>a+(v-bm)**2,0)/s20.length);
  const bUp=bm+2*std,bDn=bm-2*std;
  const rp=Math.min(14,n-1);let g=0,ls=0;
  for(let i=n-rp;i<n;i++){const d=cl[i]-cl[i-1];d>=0?g+=d:ls-=d;}
  const rsi=ls===0?100:100-100/(1+(g/rp)/(ls/rp));
  const ema=(a,l)=>{const k=2/(l+1);let e=a[0];a.slice(1).forEach(v=>e=v*k+e*(1-k));return e;};
  const macd=(n>=26?ema(cl.slice(-26),26):cl[n-1])-(n>=12?ema(cl.slice(-12),12):cl[n-1]);
  const sup=Math.min(...lo.slice(-Math.min(20,n))),res=Math.max(...hi.slice(-Math.min(20,n))),cur=cl[n-1];
  return{ma5,ma20,ma60,rsi,macd,trend:ma5>ma20?'상승↑':ma5<ma20?'하락↓':'횡보→',
    stops:[
      {lbl:'1차',p:Math.round(Math.max(sup,bDn)),sub:'볼린저하단·지지선',d:((Math.max(sup,bDn)-cur)/cur*100).toFixed(1)},
      {lbl:'2차',p:Math.round(sup*.97),sub:'주요지지 이탈',d:((sup*.97-cur)/cur*100).toFixed(1)},
      {lbl:'3차',p:Math.round(sup*.94),sub:'강한지지 붕괴',d:((sup*.94-cur)/cur*100).toFixed(1)},
    ],
    tgts:[
      {lbl:'1차',p:Math.round(Math.min(res,bUp)),sub:'저항선·볼린저상단',d:((Math.min(res,bUp)-cur)/cur*100).toFixed(1)},
      {lbl:'2차',p:Math.round(res*1.03),sub:'저항 돌파시',d:((res*1.03-cur)/cur*100).toFixed(1)},
      {lbl:'3차',p:Math.round(res*1.07),sub:'추세 연장',d:((res*1.07-cur)/cur*100).toFixed(1)},
    ],
    buys:[
      {lbl:'1차',p:Math.round(bDn*1.005),sub:'볼린저하단 반등',d:((bDn*1.005-cur)/cur*100).toFixed(1)},
      {lbl:'2차',p:Math.round(ma20*.99),sub:'MA20 지지구간',d:((ma20*.99-cur)/cur*100).toFixed(1)},
      {lbl:'추가',p:Math.round(sup*1.01),sub:'지지선 위 추가매수',d:((sup*1.01-cur)/cur*100).toFixed(1)},
    ]
  };
}

function renderTA(ta){
  set('taMA5',Math.round(ta.ma5).toLocaleString());
  set('taMA20',Math.round(ta.ma20).toLocaleString());
  set('taMA60',Math.round(ta.ma60).toLocaleString());
  const re=document.getElementById('taRSI');if(re){re.textContent=ta.rsi.toFixed(1);re.className='ta-v '+(ta.rsi<35?'up':ta.rsi>65?'dn':'');}
  const me=document.getElementById('taMACD');if(me){me.textContent=ta.macd.toFixed(1);me.className='ta-v '+(ta.macd>0?'up':'dn');}
  set('taTrend',ta.trend);
}
function renderLevels(ta,code){
  stopLv[code]=ta.stops;tgtLv[code]=ta.tgts;save();
  const se=document.getElementById('lvStops'),te=document.getElementById('lvTgts'),be=document.getElementById('lvBuys');
  if(se)se.innerHTML=ta.stops.map((v,i)=>`<div class="lv"><span class="lv-b s${i+1}">${v.lbl}</span><div class="lv-info"><span class="lv-p dn">${v.p.toLocaleString()}원</span><span class="lv-s">${v.sub}</span></div><span class="dn" style="font-size:.7rem;font-weight:800">${v.d}%</span></div>`).join('');
  if(te)te.innerHTML=ta.tgts.map((v,i)=>`<div class="lv"><span class="lv-b t${i+1}">${v.lbl}</span><div class="lv-info"><span class="lv-p up">${v.p.toLocaleString()}원</span><span class="lv-s">${v.sub}</span></div><span class="up" style="font-size:.7rem;font-weight:800">+${v.d}%</span></div>`).join('');
  if(be)be.innerHTML=ta.buys.map((v,i)=>`<div class="lv"><span class="lv-b b${i+1}">${v.lbl}</span><div class="lv-info"><span class="lv-p" style="color:#c084fc">${v.p.toLocaleString()}원</span><span class="lv-s">${v.sub}</span></div><span style="font-size:.7rem;font-weight:800;color:#c084fc">${parseFloat(v.d)>=0?'+':''}${v.d}%</span></div>`).join('');
}

function refreshDetail(idx){
  const s=stocks[idx],cp=prices[s.code];if(!cp)return;
  const chgA=cp.price-cp.prev,chgP=chgA/cp.prev*100,isUp=chgA>=0;
  const pe=document.getElementById('dPrice'),ce=document.getElementById('dChg');
  if(pe){pe.textContent=cp.price.toLocaleString()+'원';pe.className='dh-price '+(isUp?'up':'dn');}
  if(ce){ce.textContent=(isUp?'▲ +':'▼ ')+Math.abs(chgA).toLocaleString()+'원 ('+(isUp?'+':'')+chgP.toFixed(2)+'%)';ce.className='dh-chg '+(isUp?'up':'dn');}
  set('dSub',`시가 ${cp.open?.toLocaleString()} · 고가 ${cp.high?.toLocaleString()} · 저가 ${cp.low?.toLocaleString()}`);
  set('d52H',cp.h52?cp.h52.toLocaleString()+'원':'—');
  set('d52L',cp.l52?cp.l52.toLocaleString()+'원':'—');
  set('dVol',cp.vol?(cp.vol/10000).toFixed(0)+'만주':'—');
  set('dMkt',cp.mktCap?(cp.mktCap/1e12).toFixed(2)+'조':'—');
  set('dPer',cp.per?cp.per.toFixed(1)+'배':'—');
  set('dPbr',cp.pbr?cp.pbr.toFixed(2)+'배':'—');
  renderPnl(idx);
}

function renderPnl(idx){
  const s=stocks[idx];
  if(s.isWatch){['pBuy','pCur','pQty','pTotal','pPnl','pRate'].forEach(id=>set(id,'관심종목'));return;}
  const cp=prices[s.code],cur=cp?cp.price:s.buyPrice;
  const pnlA=(cur-s.buyPrice)*s.qty,pnlP=(cur-s.buyPrice)/s.buyPrice*100,isUp=pnlA>=0;
  set('pBuy',s.buyPrice.toLocaleString()+'원');
  set('pCur',cur.toLocaleString()+'원');
  set('pQty',s.qty.toLocaleString()+'주');
  set('pTotal',(s.buyPrice*s.qty).toLocaleString()+'원');
  const pe=document.getElementById('pPnl'),re=document.getElementById('pRate');
  if(pe){pe.textContent=(isUp?'+':'')+Math.round(pnlA).toLocaleString()+'원';pe.className='pc-v '+(isUp?'up':'dn');}
  if(re){re.textContent=(isUp?'+':'')+pnlP.toFixed(2)+'%';re.className='pc-v '+(isUp?'up':'dn');}
}

function renderTgtTab(code){
  const el=document.getElementById('tgtArea');if(!el)return;
  const cur=prices[code]?.price||100000;
  const bks=[
    {n:'삼성증권',op:'매수',t:Math.round(cur*1.22),d:'2026.06.27'},
    {n:'KB증권',op:'매수',t:Math.round(cur*1.18),d:'2026.06.26'},
    {n:'NH투자증권',op:'매수',t:Math.round(cur*1.20),d:'2026.06.25'},
    {n:'한국투자증권',op:'중립',t:Math.round(cur*1.08),d:'2026.06.24'},
    {n:'미래에셋',op:'매수',t:Math.round(cur*1.25),d:'2026.06.23'},
    {n:'신한투자',op:'매수',t:Math.round(cur*1.15),d:'2026.06.22'},
  ];
  const avg=Math.round(bks.reduce((a,b)=>a+b.t,0)/bks.length);
  const up=((avg-cur)/cur*100).toFixed(1);
  el.innerHTML=`<div class="box-t" style="margin-bottom:8px">🎯 증권사 목표주가</div>
  <table class="ftable"><thead><tr><th>증권사</th><th>의견</th><th>목표주가</th><th>현재대비</th><th>날짜</th></tr></thead>
  <tbody>${bks.map(b=>{const d=((b.t-cur)/cur*100).toFixed(1);return`<tr><td>${b.n}</td><td><span class="${b.op==='매수'?'op-buy':'op-hold'}">${b.op}</span></td><td>${b.t.toLocaleString()}원</td><td class="up">+${d}%</td><td style="color:var(--mt)">${b.d}</td></tr>`;}).join('')}</tbody></table>
  <div style="margin-top:9px;padding:9px 11px;background:rgba(59,130,246,.07);border-radius:8px;font-size:.78rem;color:#cbd5e1">
    평균 목표주가 <b style="color:#60a5fa">${avg.toLocaleString()}원</b> | 상승여력 <b class="up">+${up}%</b>
  </div>`;
}

async function renderThemeTab(code){
  const ti=THEMES[code]||THEMES.DEFAULT;
  const tEl=document.getElementById('thTags'),pEl=document.getElementById('peerGrid');
  if(tEl)tEl.innerHTML=ti.th.map(t=>`<span class="badge">🏷 ${t}</span>`).join('');
  if(pEl){
    pEl.innerHTML='<div style="color:var(--mt);font-size:.76rem">조회중...</div>';
    const list=await Promise.all(ti.peers.map(async p=>{const cp=await fetchPrice(p.c);return{...p,cp};}));
    if(!document.getElementById('peerGrid'))return;
    pEl.innerHTML=list.map(p=>{
      const chg=p.cp?(p.cp.price-p.cp.prev)/p.cp.prev*100:null;const isUp=chg>=0;
      return`<div class="peer-c"><div class="peer-n">${p.n}</div><div class="peer-cd">${p.c}</div>
        <div class="peer-p ${isUp?'up':'dn'}">${p.cp?p.cp.price.toLocaleString()+'원':'—'}</div>
        <div class="peer-g ${isUp?'up':'dn'}">${chg!==null?(isUp?'▲ +':'▼ ')+Math.abs(chg).toFixed(2)+'%':''}</div>
      </div>`;
    }).join('');
  }
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const tc=document.getElementById('tab-'+name);if(tc)tc.classList.add('active');
}

/* ══════════════════════════════════
   초기화
══════════════════════════════════ */
window.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('devId').textContent=(/Android|iPhone|iPad/i.test(navigator.userAgent)?'📱':'🖥')+' '+DID;
  set('liveTime',new Date().toLocaleTimeString('ko-KR'));
  renderList();updateSummary();
  fetchMarket();
  fetchThemes();
  if(stocks.length>0)loadLeftNews();

  for(const s of stocks){const p=await fetchPrice(s.code);if(p)prices[s.code]=p;}
  renderList();updateSummary();
  if(selIdx>=0)refreshDetail(selIdx);

  // 5초마다 주가 갱신
  timer=setInterval(async()=>{
    set('liveTime',new Date().toLocaleTimeString('ko-KR'));
    fetchMarket();
    for(const s of stocks){const p=await fetchPrice(s.code);if(p)prices[s.code]=p;}
    renderList();updateSummary();
    if(selIdx>=0)refreshDetail(selIdx);
  },5000);

  // 2분마다 왼쪽 뉴스 갱신
  setInterval(()=>{if(stocks.length>0)loadLeftNews();},120000);

  // 3분마다 우측 뉴스+공시 갱신
  setInterval(()=>{
    if(selIdx>=0){const s=stocks[selIdx];loadRightNews(s.name,s.code);}
  },180000);

  // 5분마다 테마 갱신
  setInterval(()=>fetchThemes(),300000);
});

window.addEventListener('resize',()=>{if(curOHLC.length)drawCandleChart(curOHLC);});
window.addEventListener('beforeunload',()=>{if(timer)clearInterval(timer);});
</script>
